<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jungle Game Map</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: url('assets/jungle-bg.jpg') no-repeat center center;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

.game-container {
    position: relative;
    width: 100%;       /* full width of the browser window */
    height: 100vh;     /* full height of the viewport */
    overflow: hidden;
}

/* Video covers container */
video {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
}

/* Level button on top of video */
.level-btn1 {
    position: absolute;       /* absolute to container */
    top: 50%;                 /* adjust per your layout */
    left: 50%;
    transform: translate(-50%, -50%); /* center button */
    width: 80px;
    height: 80px;
    border: none;
    border-radius: 50%;
    background-image: url('assests/button.png'); /* your PNG */
    background-size: cover;
    background-position: center;
    color: white;
    font-size: 24px;
    cursor: pointer;
    z-index: 10;              /* ensures button is above video */
}
</style>
</head>

<body>

<div class="game-container">
    <video autoplay loop muted>
        <source src="assests/backgroundmap.mp4" type="video/mp4">
    </video>

    <!-- Example button -->
    <button class="level-btn1">1</button>
</div>

</body>
</html>
